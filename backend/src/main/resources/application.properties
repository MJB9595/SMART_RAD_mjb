spring.application.name=hris
spring.profiles.active=local

server.port=8080
server.servlet.context-path=/api

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.jackson.time-zone=Asia/Seoul
spring.jackson.default-property-inclusion=non_null

jwt.secret=${JWT_SECRET:tp-hr-local-dev-secret-key-please-change-in-production-32bytes}
jwt.access-token-expiration-ms=${JWT_EXPIRATION_MS:3600000}

kakao.client-id=${KAKAO_REST_API_KEY:}
kakao.client-secret=${KAKAO_CLIENT_SECRET:}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:http://localhost:3000/oauth/kakao/callback}
kakao.token-uri=https://kauth.kakao.com/oauth/token
kakao.user-info-uri=https://kapi.kakao.com/v2/user/me

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
